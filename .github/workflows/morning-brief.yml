name: Generate Morning Brief

on:
  schedule:
    # 5:30am AEST = 7:30pm UTC (previous day) — runs Mon-Fri
    # AEST is UTC+10, so 5:30am AEST = 19:30 UTC day before
    - cron: '30 19 * * 0-4'  # Sunday-Thursday UTC = Monday-Friday AEST
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Need write access to commit RSS feed back to repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          RSS_FEED_URL: ${{ secrets.RSS_FEED_URL }}
          RSS_OUTPUT_PATH: ./rss/feed.xml
        run: python scripts/generate.py

      - name: Commit and push RSS feed update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Morning Brief Bot"
          git add rss/
          git diff --staged --quiet || git commit -m "Morning brief $(date +%Y-%m-%d)"
          git push

  # Separate job: deploy rss/ folder to GitHub Pages
  deploy-pages:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # pull latest after the generate job pushed

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload rss folder as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './rss'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
